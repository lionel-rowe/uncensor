<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Uncensor</title>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<div class="app">
			<h1>Uncensor</h1>
			<nav class="tabs" role="tablist">
				<a class="tab" href="#" role="tab" id="tab-instructions">Instructions</a>
				<a class="tab" href="#obfuscate" role="tab" id="tab-obfuscate">Obfuscate</a>
				<a class="tab" href="#deobfuscate" role="tab" id="tab-deobfuscate">Deobfuscate</a>
				<a class="tab" href="#word-list" role="tab" id="tab-word-list">Word List</a>
			</nav>

			<main class="card">
				<section
					id="panel-instructions"
					class="panel"
					role="tabpanel"
					aria-labelledby="tab-instructions"
					hidden
				>
					<!-- INSTRUCTIONS -->
				</section>

				<section id="panel-obfuscate" class="panel" role="tabpanel" aria-labelledby="tab-obfuscate" hidden>
					<div>
						<div id="label-text-input" class="field-label">Text</div>
						<div id="text-input" class="editor"></div>
					</div>
				</section>

				<section id="panel-word-list" class="panel" role="tabpanel" aria-labelledby="tab-word-list" hidden>
					<label class="checkbox-label" for="include-default-words">
						<input id="include-default-words" type="checkbox" checked />
						Include default word list
					</label>
					<label for="words">Custom word list</label>
					<textarea id="words" class="words" placeholder="One word per line"></textarea>
					<p class="hint">One word per line, or comma-separated. Example: spam, rudeword</p>
				</section>
			</main>
		</div>

		<script type="module" src="index.mjs"></script>
	</body>
</html>
